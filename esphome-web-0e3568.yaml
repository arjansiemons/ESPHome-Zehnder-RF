substitutions:
  devicename: zehnder_sniffer
  upper_devicename: Zehnder Sniffer

esphome:
  name: esphome-web-0e3568
  friendly_name: ESPHome Web 0e3568
  min_version: 2025.11.0
  name_add_mac_suffix: false

esp32:
  variant: esp32
  board: esp32dev
  framework:
    type: arduino  # Zehnder component werkt met Arduino framework

# Enable logging
logger:
  level: DEBUG
  baud_rate: 115200

# Enable Home Assistant API
api:
  services:
    - service: set_speed
      variables:
        speed: int
        timer: int
      then:
        - lambda: |-
            zehnder_fan->setSpeed(speed, timer);

# Allow Over-The-Air updates
ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot
  ap:
    ssid: "Zehnder-Sniffer"
    password: "zehnder123"

captive_portal:

# Load external components from GitHub
external_components:
  - source:
      type: git
      url: https://github.com/arjansiemons/ESPHome-Zehnder-RF
      ref: main
    components: [ nrf905, zehnder ]
    refresh: 0s

# SPI configuratie voor ESP32
spi:
  clk_pin: GPIO18   # VSPI CLK
  mosi_pin: GPIO23  # VSPI MOSI
  miso_pin: GPIO19  # VSPI MISO

# nRF905 configuratie
nrf905:
  id: "nrf905_rf"
  cs_pin: GPIO5     # CSN
  cd_pin: GPIO4     # Carrier Detect
  ce_pin: GPIO16    # Chip Enable
  pwr_pin: GPIO17   # Power
  txen_pin: GPIO2   # TX Enable
  dr_pin: GPIO15    # Data Ready (interrupt)

# The FAN controller
fan:
  - platform: zehnder
    id: zehnder_fan
    name: "Zehnder Ventilation"
    nrf905: nrf905_rf
    update_interval: "60s"

# Handige buttons voor testen
button:
  - platform: restart
    id: ${devicename}_restart
    name: ${upper_devicename} Restart

  - platform: template
    id: ${devicename}_high_10
    name: ${upper_devicename} High 10min
    on_press:
      then:
        lambda: |-
          zehnder_fan->setSpeed(3, 10);

  - platform: template
    id: ${devicename}_medium
    name: ${upper_devicename} Medium
    on_press:
      then:
        lambda: |-
          zehnder_fan->setSpeed(2, 0);

  - platform: template
    id: ${devicename}_manual_init
    name: ${upper_devicename} Manual Init
    on_press:
      then:
        lambda: |-
          zehnder_fan->manual_init();

  - platform: template
    id: ${devicename}_status_check
    name: ${upper_devicename} Status Check
    on_press:
      then:
        lambda: |-
          zehnder_fan->status_check();
