substitutions:
  devicename: zehnder_fan
  upper_devicename: Zehnder Fan

esphome:
  name: zehnder-fan
  friendly_name: Zehnder Ventilation
  min_version: 2025.11.0
  name_add_mac_suffix: false

esp32:
  variant: esp32
  board: esp32dev
  framework:
    type: arduino

# Enable logging
logger:
  level: INFO  # Change to DEBUG for detailed RF frame logs
  baud_rate: 115200

# Enable Home Assistant API
api:

# Allow Over-The-Air updates
ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot
  ap:
    ssid: "Zehnder-Fan-Fallback"
    password: "zehnder123"

captive_portal:

# Load external components from GitHub
external_components:
  - source:
      type: git
      url: https://github.com/arjansiemons/ESPHome-Zehnder-RF
      ref: main
    components: [ nrf905, zehnder ]
    refresh: 0s

# SPI configuration for ESP32
spi:
  clk_pin: GPIO18   # VSPI CLK
  mosi_pin: GPIO23  # VSPI MOSI
  miso_pin: GPIO19  # VSPI MISO

# nRF905 RF transceiver configuration
nrf905:
  id: "nrf905_rf"
  cs_pin: GPIO5     # CSN (Chip Select)
  cd_pin: GPIO4     # Carrier Detect
  ce_pin: GPIO16    # Chip Enable
  pwr_pin: GPIO17   # Power
  txen_pin: GPIO2   # TX Enable
  dr_pin: GPIO15    # Data Ready (interrupt)

# Zehnder Ventilation Fan
fan:
  - platform: zehnder
    id: zehnder_fan
    name: "Zehnder Ventilation"
    nrf905: nrf905_rf
    update_interval: "60s"

# Initialization and diagnostics buttons
button:
  - platform: restart
    id: ${devicename}_restart
    name: ${upper_devicename} Restart

  - platform: template
    id: ${devicename}_manual_init
    name: ${upper_devicename} Manual Init
    entity_category: config
    on_press:
      then:
        lambda: |-
          zehnder_fan->manual_init();

  - platform: template
    id: ${devicename}_pair_remote
    name: ${upper_devicename} Pair as Remote
    entity_category: config
    on_press:
      then:
        lambda: |-
          zehnder_fan->pair_as_remote();

  - platform: template
    id: ${devicename}_status_check
    name: ${upper_devicename} Status Check
    entity_category: diagnostic
    on_press:
      then:
        lambda: |-
          zehnder_fan->status_check();

  - platform: template
    id: ${devicename}_clear_config
    name: ${upper_devicename} Clear Config
    entity_category: config
    on_press:
      then:
        lambda: |-
          zehnder_fan->clear_config();
